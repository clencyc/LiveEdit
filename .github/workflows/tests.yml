name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: LiveEditBackend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        working-directory: LiveEditBackend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FLASK_ENV: testing
        run: |
          pytest --cov=. --cov-report=term-missing --cov-fail-under=70 -v

  frontend-tests:
    name: Frontend (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: LiveEditFronten/package-lock.json

      - name: Install dependencies
        working-directory: LiveEditFronten
        run: npm ci

      - name: Run tests with coverage
        working-directory: LiveEditFronten
        run: npm test -- --coverage --watchAll=false --coverageThreshold='{"global":{"lines":70}}'